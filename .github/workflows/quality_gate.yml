name: Mister Alert Quality Gate

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  enforce-constitution:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🏛️ Run Architecture Inspector
        run: python app/infrastructure/checks/architecture_inspector.py
        
      - name: 📜 Run Digital Constitution Enforcer
        run: python app/infrastructure/checks/dev_constitution.py
